name: Build Windows installer

# 手动触发，或推送 v* 标签时触发；打标签时自动把 exe 挂到对应 Release。
# 应用内置中/EN 运行时切换（0.2.0 起），单一安装包即覆盖双语——不再分中文版。
on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies (Windows binaries)
        run: npm ci

      - name: Build app + installer
        shell: bash
        run: npm run build && npx electron-builder --win --publish never
        env:
          BLOB_READ_WRITE_TOKEN: ""

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rainrain-windows-installer
          path: dist/*.exe
          if-no-files-found: error

      - name: Attach to release (tag builds)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe
